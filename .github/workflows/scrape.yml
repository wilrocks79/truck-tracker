name: Scrape & Deploy

# Runs daily at 3pm UTC (8am Pacific) and can be triggered manually
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch: # "Run workflow" button in GitHub UI

# Allow the workflow to commit data files and deploy to Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run_scraper.py --verbose

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "scrape: $(date -u +%Y-%m-%d)"
          git push

      # Deploy the dashboard to GitHub Pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: data/

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
