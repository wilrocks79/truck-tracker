<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squamish Truck Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0b0d;
  --bg-panel: #111214;
  --bg-card: #161819;
  --bg-card-hover: #1c1e20;
  --bg-input: #0e0f11;
  --border: #2a2c2e;
  --border-subtle: #1e2022;
  --text-primary: #e8e6e1;
  --text-secondary: #8a8680;
  --text-dim: #5a5650;
  --amber: #d4a254;
  --amber-dim: #b8893e;
  --amber-glow: rgba(212, 162, 84, 0.08);
  --copper: #c47a4a;
  --green: #5a9e6f;
  --green-dim: rgba(90, 158, 111, 0.15);
  --red: #c45a4a;
  --red-dim: rgba(196, 90, 74, 0.15);
  --blue: #4a7ac4;
  --no-price: #c4784a;
  --no-price-bg: rgba(196, 120, 74, 0.08);
  --radius: 6px;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
}

html { font-size: 14px; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-sans);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.shell {
  max-width: 1440px;
  margin: 0 auto;
  padding: 2rem 2.5rem 4rem;
}

/* ─── HEADER ─── */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.header-left h1 {
  font-family: var(--font-mono);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.header-left h1::before {
  content: '▣';
  font-size: 1.1rem;
  opacity: 0.7;
}

.header-left .subtitle {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 0.3rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.header-right {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  text-align: right;
}

.header-right .live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 0.4rem;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ─── STAT STRIP ─── */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px;
  background: var(--border-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  margin-bottom: 2rem;
  overflow: hidden;
}

.stat-cell {
  background: var(--bg-panel);
  padding: 1.1rem 1.4rem;
}

.stat-cell .label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

.stat-cell .value {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-primary);
}

.stat-cell .value.amber { color: var(--amber); }

.stat-cell .detail {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.15rem;
}

/* ─── CONTROLS BAR ─── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  align-items: center;
  margin-bottom: 1.5rem;
  padding: 1rem 1.2rem;
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
}

.controls label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-right: 0.2rem;
}

.controls select,
.controls input {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.45rem 0.7rem;
  outline: none;
  transition: border-color 0.15s;
}

.controls select:focus,
.controls input:focus {
  border-color: var(--amber-dim);
}

.controls select { cursor: pointer; padding-right: 1.5rem; }

.filter-group {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.separator {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 0.4rem;
}

.controls .result-count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* ─── TRUCK GRID ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 0.9rem;
  margin-bottom: 2.5rem;
}

.truck-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
}

.truck-card:hover {
  border-color: var(--border);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.truck-card.no-price {
  border-left: 3px solid var(--no-price);
}

/* Thumbnail */
.card-thumb {
  width: 100%;
  height: 200px;
  background: var(--bg-panel);
  overflow: hidden;
  position: relative;
}

.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}

.truck-card:hover .card-thumb img {
  transform: scale(1.03);
}

.card-thumb .no-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  background: linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-card) 100%);
}

.card-body {
  padding: 1.1rem 1.3rem 1.2rem;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.6rem;
  gap: 0.8rem;
}

.card-title {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text-primary);
  line-height: 1.3;
}

.card-title .year {
  color: var(--amber);
}

.card-price {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--text-primary);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-price.missing {
  color: var(--no-price);
  font-weight: 500;
  font-size: 0.8rem;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem 1rem;
  margin-bottom: 0.8rem;
}

.card-meta span {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
}

.card-meta span::before {
  content: attr(data-label);
  color: var(--text-dim);
  margin-right: 0.3rem;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: auto;
  padding-top: 0.7rem;
  border-top: 1px solid var(--border-subtle);
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 0.2rem 0.5rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
}

.tag.dealer { background: var(--amber-glow); color: var(--amber-dim); }
.tag.fuel { }
.tag.trans { }

/* ─── SOLD / OFF MARKET ─── */
.sold-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 0.9rem;
  margin-bottom: 2.5rem;
}

.sold-grid .truck-card {
  opacity: 0.55;
  filter: grayscale(0.4);
  transition: opacity 0.2s, filter 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}

.sold-grid .truck-card:hover {
  opacity: 0.85;
  filter: grayscale(0);
}

.sold-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.25rem 0.6rem;
  border-radius: 3px;
  background: var(--red-dim);
  color: var(--red);
  z-index: 1;
}

.sold-empty {
  text-align: center;
  padding: 2rem;
  font-family: var(--font-mono);
  color: var(--text-dim);
  font-size: 0.8rem;
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  margin-bottom: 2.5rem;
}

/* ─── PRICE HISTORY SECTION ─── */
.section-header {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

.history-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-panel);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 2rem;
}

.history-table th {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  padding: 0.8rem 1rem;
  text-align: left;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-subtle);
}

.history-table td {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}

.history-table tr:last-child td { border-bottom: none; }

.history-table .event-new {
  color: var(--green);
}

.history-table .event-price {
  color: var(--amber);
}

.history-table .event-removed {
  color: var(--red);
}

.history-table .event-returned {
  color: var(--blue);
}

.price-down { color: var(--green); }
.price-up { color: var(--red); }

.empty-state {
  text-align: center;
  padding: 3rem;
  font-family: var(--font-mono);
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .shell { padding: 1rem; }
  .header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  .header-right { text-align: left; }
  .grid { grid-template-columns: 1fr; gap: 0.7rem; }
  .controls { flex-direction: column; align-items: stretch; }
  .filter-group { flex-wrap: wrap; }
  .separator { display: none; }
  .controls .result-count { margin-left: 0; margin-top: 0.3rem; }
  .stat-strip { grid-template-columns: repeat(2, 1fr); }
}

/* ─── ANIMATIONS ─── */
.stat-strip, .controls, .grid, .history-table {
  animation: fadeUp 0.4s ease-out both;
}

.stat-strip { animation-delay: 0.05s; }
.controls { animation-delay: 0.1s; }
.grid { animation-delay: 0.15s; }
.history-table { animation-delay: 0.2s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- DATA INJECTION POINT — replaced by generate_dashboard.py -->
<script id="truck-data">
// __TRUCK_DATA_INJECT__
const INVENTORY = [];
const PRICE_HISTORY = [];
const LAST_UPDATED = "";
</script>

<div class="shell">
  <header class="header">
    <div class="header-left">
      <h1>Squamish Truck Tracker</h1>
      <div class="subtitle">Used truck inventory — Squamish, BC</div>
    </div>
    <div class="header-right">
      <div><span class="live-dot"></span>Last scrape: <span id="last-updated">—</span></div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stat-strip" id="stats"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="filter-group">
      <label>Dealer</label>
      <select id="filter-dealer"><option value="">All</option></select>
    </div>
    <div class="separator"></div>
    <div class="filter-group">
      <label>Make</label>
      <select id="filter-make"><option value="">All</option></select>
    </div>
    <div class="separator"></div>
    <div class="filter-group">
      <label>Price</label>
      <input type="number" id="filter-price-min" placeholder="Min" style="width:90px">
      <span style="color:var(--text-dim)">–</span>
      <input type="number" id="filter-price-max" placeholder="Max" style="width:90px">
    </div>
    <div class="separator"></div>
    <div class="filter-group">
      <label>Sort</label>
      <select id="sort-by">
        <option value="newest-priced">Newest (priced first)</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
        <option value="year-desc">Newest</option>
        <option value="year-asc">Oldest</option>
        <option value="mileage-asc">Mileage ↑</option>
        <option value="days-desc">Days on market ↓</option>
      </select>
    </div>
    <div class="separator"></div>
    <div class="filter-group">
      <label>Units</label>
      <select id="unit-toggle">
        <option value="mi">Miles</option>
        <option value="km">Kilometres</option>
      </select>
    </div>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Grid -->
  <div class="grid" id="truck-grid"></div>

  <!-- Sold / Off Market -->
  <div class="section-header">Sold / Off Market</div>
  <div class="sold-grid" id="sold-grid"></div>

  <!-- Price History -->
  <div class="section-header">Price History</div>
  <table class="history-table" id="history-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Vehicle</th>
        <th>Event</th>
        <th>Old Price</th>
        <th>New Price</th>
        <th>Dealer</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<script>
(function() {
  // ─── Helpers ───
  function priceNum(p) {
    if (!p) return 0;
    return parseInt(String(p).replace(/[^0-9]/g, ''), 10) || 0;
  }

  function fmtPrice(p) {
    const n = priceNum(p);
    if (!n) return '';
    return '$' + n.toLocaleString();
  }

  function getUnit() {
    return document.getElementById('unit-toggle').value;
  }

  function fmtMileage(m) {
    const n = parseInt(String(m).replace(/[^0-9]/g, ''), 10) || 0;
    if (!n) return '—';
    if (getUnit() === 'mi') {
      return Math.round(n * 0.621371).toLocaleString() + ' mi';
    }
    return n.toLocaleString() + ' km';
  }

  function fmtMpg(v) {
    const combined = parseInt(v.mpg_combined) || 0;
    if (!combined) return '';
    const city = parseInt(v.mpg_city) || 0;
    const hwy = parseInt(v.mpg_highway) || 0;
    if (getUnit() === 'km') {
      // Convert MPG to L/100km (235.215 / mpg)
      const lper100 = (235.215 / combined).toFixed(1);
      return lper100 + ' L/100km';
    }
    return combined + ' mpg' + (city && hwy ? ` (${city}/${hwy})` : '');
  }

  function daysBetween(dateStr) {
    if (!dateStr) return 0;
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0,0,0,0);
    return Math.max(0, Math.round((now - d) / 86400000));
  }

  // ─── State ───
  const inv = INVENTORY.filter(v => v.is_active === 'true' || v.is_active === true);

  // Populate last updated
  document.getElementById('last-updated').textContent = LAST_UPDATED || 'unknown';

  // ─── Stats ───
  function renderStats(vehicles) {
    const prices = vehicles.map(v => priceNum(v.current_price || v.price)).filter(p => p > 0);
    const avg = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
    const min = prices.length ? Math.min(...prices) : 0;
    const max = prices.length ? Math.max(...prices) : 0;
    const noPriceCount = vehicles.filter(v => !priceNum(v.current_price || v.price)).length;
    const dealers = new Set(vehicles.map(v => v.dealer)).size;

    document.getElementById('stats').innerHTML = `
      <div class="stat-cell">
        <div class="label">Active Listings</div>
        <div class="value amber">${vehicles.length}</div>
        <div class="detail">${dealers} dealer${dealers !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat-cell">
        <div class="label">Avg Price</div>
        <div class="value">${avg ? fmtPrice(avg) : '—'}</div>
        <div class="detail">${noPriceCount ? noPriceCount + ' unlisted' : 'all priced'}</div>
      </div>
      <div class="stat-cell">
        <div class="label">Price Range</div>
        <div class="value">${min ? fmtPrice(min) : '—'}</div>
        <div class="detail">${max ? 'to ' + fmtPrice(max) : ''}</div>
      </div>
      <div class="stat-cell">
        <div class="label">Makes</div>
        <div class="value">${new Set(vehicles.map(v => v.make).filter(Boolean)).size}</div>
        <div class="detail">${new Set(vehicles.map(v => v.model).filter(Boolean)).size} models</div>
      </div>
    `;
  }

  // ─── Filters ───
  const dealers = [...new Set(inv.map(v => v.dealer).filter(Boolean))].sort();
  const makes = [...new Set(inv.map(v => v.make).filter(Boolean))].sort();

  const dealerSel = document.getElementById('filter-dealer');
  const makeSel = document.getElementById('filter-make');

  dealers.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dealerSel.appendChild(o); });
  makes.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; makeSel.appendChild(o); });

  function getFiltered() {
    let list = [...inv];
    const dealer = dealerSel.value;
    const make = makeSel.value;
    const pMin = parseInt(document.getElementById('filter-price-min').value) || 0;
    const pMax = parseInt(document.getElementById('filter-price-max').value) || Infinity;

    if (dealer) list = list.filter(v => v.dealer === dealer);
    if (make) list = list.filter(v => v.make === make);
    if (pMin > 0) list = list.filter(v => priceNum(v.current_price || v.price) >= pMin);
    if (pMax < Infinity) list = list.filter(v => {
      const p = priceNum(v.current_price || v.price);
      return p > 0 && p <= pMax;
    });

    // Sort
    const sort = document.getElementById('sort-by').value;
    list.sort((a, b) => {
      const pa = priceNum(a.current_price || a.price);
      const pb = priceNum(b.current_price || b.price);
      switch (sort) {
        case 'newest-priced':
          // No-price listings sink to bottom, then sort newest first
          if (pa && !pb) return -1;
          if (!pa && pb) return 1;
          return (parseInt(b.year)||0) - (parseInt(a.year)||0);
        case 'price-asc': return (pa || 999999999) - (pb || 999999999);
        case 'price-desc': return (pb || 0) - (pa || 0);
        case 'year-desc': return (parseInt(b.year)||0) - (parseInt(a.year)||0);
        case 'year-asc': return (parseInt(a.year)||0) - (parseInt(b.year)||0);
        case 'mileage-asc': return (parseInt(String(a.mileage).replace(/\D/g,''))||999999) - (parseInt(String(b.mileage).replace(/\D/g,''))||999999);
        case 'days-desc': return daysBetween(a.date_first_seen) - daysBetween(b.date_first_seen);
        default: return 0;
      }
    });

    return list;
  }

  // ─── Render Grid ───
  function renderGrid() {
    const list = getFiltered();
    const grid = document.getElementById('truck-grid');

    renderStats(list);
    document.getElementById('result-count').textContent = list.length + ' truck' + (list.length !== 1 ? 's' : '');

    if (!list.length) {
      grid.innerHTML = '<div class="empty-state" style="background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:var(--radius);grid-column:1/-1">No trucks match your filters.</div>';
      return;
    }

    grid.innerHTML = list.map(v => {
      const price = priceNum(v.current_price || v.price);
      const hasPrice = price > 0;
      const days = daysBetween(v.date_first_seen);
      const yearSpan = v.year ? `<span class="year">${v.year}</span> ` : '';
      const rest = [v.make, v.model].filter(Boolean).join(' ') || 'Unknown Vehicle';

      const tags = [];
      if (v.dealer) tags.push(`<span class="tag dealer">${v.dealer}</span>`);
      if (v.fuel_type) tags.push(`<span class="tag fuel">${v.fuel_type}</span>`);
      if (v.transmission) tags.push(`<span class="tag trans">${v.transmission}</span>`);
      if (v.drivetrain) tags.push(`<span class="tag">${v.drivetrain}</span>`);

      // Thumbnail
      const thumb = v.image_url
        ? `<img src="${v.image_url}" alt="${v.year} ${v.make} ${v.model}" loading="lazy">`
        : `<div class="no-img">No photo</div>`;

      // Whole card is a clickable link
      const tag = v.url ? 'a' : 'div';
      const href = v.url ? ` href="${v.url}" target="_blank" rel="noopener"` : '';

      return `
        <${tag} class="truck-card${hasPrice ? '' : ' no-price'}"${href}>
          <div class="card-thumb">${thumb}</div>
          <div class="card-body">
            <div class="card-top">
              <div class="card-title">${yearSpan}${rest}${v.trim ? `<br><span style="font-weight:400;font-size:0.78rem;color:var(--text-secondary)">${v.trim}</span>` : ''}</div>
              <div class="card-price${hasPrice ? '' : ' missing'}">${hasPrice ? fmtPrice(price) : 'No price'}</div>
            </div>
            <div class="card-meta">
              <span data-label="${getUnit() === 'mi' ? 'mi' : 'km'}">${fmtMileage(v.mileage)}</span>
              ${fmtMpg(v) ? `<span data-label="fuel">${fmtMpg(v)}</span>` : ''}
              <span data-label="days">${days}d on market</span>
              ${v.colour ? `<span data-label="colour">${v.colour}</span>` : ''}
            </div>
            <div class="card-tags">${tags.join('')}</div>
          </div>
        </${tag}>
      `;
    }).join('');
  }

  // ─── Render Sold ───
  function renderSold() {
    const grid = document.getElementById('sold-grid');
    const sold = INVENTORY.filter(v => v.is_active === 'false' || v.is_active === false);

    if (!sold.length) {
      grid.innerHTML = '<div class="sold-empty">No sold/removed vehicles yet. When a listing disappears from a dealer site, it will show up here.</div>';
      return;
    }

    // Sort by date_last_seen descending (most recently sold first)
    sold.sort((a, b) => (b.date_last_seen || '').localeCompare(a.date_last_seen || ''));

    grid.innerHTML = sold.map(v => {
      const price = priceNum(v.current_price || v.price);
      const hasPrice = price > 0;
      const daysOnMarket = daysBetween(v.date_first_seen) - daysBetween(v.date_last_seen);
      const yearSpan = v.year ? `<span class="year">${v.year}</span> ` : '';
      const rest = [v.make, v.model].filter(Boolean).join(' ') || 'Unknown Vehicle';

      const tags = [];
      if (v.dealer) tags.push(`<span class="tag dealer">${v.dealer}</span>`);
      if (v.fuel_type) tags.push(`<span class="tag fuel">${v.fuel_type}</span>`);
      if (v.drivetrain) tags.push(`<span class="tag">${v.drivetrain}</span>`);

      const thumb = v.image_url
        ? `<img src="${v.image_url}" alt="${v.year} ${v.make} ${v.model}" loading="lazy">`
        : `<div class="no-img">No photo</div>`;

      return `
        <div class="truck-card" style="position:relative">
          <div class="sold-badge">Off market</div>
          <div class="card-thumb">${thumb}</div>
          <div class="card-body">
            <div class="card-top">
              <div class="card-title">${yearSpan}${rest}${v.trim ? `<br><span style="font-weight:400;font-size:0.78rem;color:var(--text-secondary)">${v.trim}</span>` : ''}</div>
              <div class="card-price${hasPrice ? '' : ' missing'}">${hasPrice ? fmtPrice(price) : 'No price'}</div>
            </div>
            <div class="card-meta">
              <span data-label="${getUnit() === 'mi' ? 'mi' : 'km'}">${fmtMileage(v.mileage)}</span>
              ${fmtMpg(v) ? `<span data-label="fuel">${fmtMpg(v)}</span>` : ''}
              <span data-label="listed">${daysOnMarket > 0 ? daysOnMarket + 'd' : '<1d'}</span>
              <span data-label="last seen">${v.date_last_seen || '—'}</span>
            </div>
            <div class="card-tags">${tags.join('')}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── Render History ───
  function renderHistory() {
    const body = document.getElementById('history-body');

    // Build vehicle lookup for names
    const lookup = {};
    INVENTORY.forEach(v => { lookup[v.vin] = v; });

    const events = [...PRICE_HISTORY].reverse(); // newest first

    if (!events.length) {
      body.innerHTML = '<tr><td colspan="6" class="empty-state">No price history yet. Run the scraper again to track changes.</td></tr>';
      return;
    }

    body.innerHTML = events.slice(0, 50).map(e => {
      const v = lookup[e.vin] || {};
      const name = [v.year, v.make, v.model].filter(Boolean).join(' ') || e.vin;

      let eventLabel, eventClass;
      switch (e.event) {
        case 'new_listing': eventLabel = 'NEW'; eventClass = 'event-new'; break;
        case 'price_change': eventLabel = 'PRICE Δ'; eventClass = 'event-price'; break;
        case 'removed': eventLabel = 'REMOVED'; eventClass = 'event-removed'; break;
        case 'returned': eventLabel = 'RETURNED'; eventClass = 'event-returned'; break;
        default: eventLabel = e.event; eventClass = '';
      }

      const oldP = priceNum(e.old_price);
      const newP = priceNum(e.new_price);
      let priceClass = '';
      if (e.event === 'price_change') {
        priceClass = newP < oldP ? 'price-down' : 'price-up';
      }

      return `<tr>
        <td>${e.date}</td>
        <td style="color:var(--text-primary)">${name}</td>
        <td class="${eventClass}">${eventLabel}</td>
        <td>${oldP ? fmtPrice(oldP) : '—'}</td>
        <td class="${priceClass}">${newP ? fmtPrice(newP) : '—'}</td>
        <td>${e.dealer}</td>
      </tr>`;
    }).join('');
  }

  // ─── Bind Events ───
  function renderAll() { renderGrid(); renderSold(); }

  ['filter-dealer', 'filter-make', 'filter-price-min', 'filter-price-max', 'sort-by'].forEach(id => {
    document.getElementById(id).addEventListener('change', renderGrid);
    document.getElementById(id).addEventListener('input', renderGrid);
  });
  // Unit toggle re-renders everything (active + sold cards use the unit)
  document.getElementById('unit-toggle').addEventListener('change', renderAll);

  // ─── Init ───
  renderAll();
  renderHistory();
})();
</script>
</body>
</html>
